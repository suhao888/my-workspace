    - generic [ref=e65]:
      - paragraph [ref=e66]:
        - strong [ref=e67]: 篡改猴 (Tampermonkey)
        - text: 是拥有
        - strong [ref=e68]: 超过 1000 万用户
        - text: 的最流行的浏览器扩展之一。 它适用于
        - link "Chrome" [ref=e69] [cursor=pointer]:
          - /url: https://www.tampermonkey.net/index.php?browser=chrome
          - strong [ref=e70]: Chrome
        - text: 、
        - link "Microsoft Edge" [ref=e71] [cursor=pointer]:
          - /url: https://www.tampermonkey.net/index.php?browser=edge
          - strong [ref=e72]: Microsoft Edge
        - text: 、
        - link "Safari" [ref=e73] [cursor=pointer]:
          - /url: https://www.tampermonkey.net/index.php?browser=safari
          - strong [ref=e74]: Safari
        - text: 、
        - link "Opera Next" [ref=e75] [cursor=pointer]:
          - /url: https://www.tampermonkey.net/index.php?browser=opera
          - strong [ref=e76]: Opera Next
        - text: 和
        - link "Firefox" [ref=e77] [cursor=pointer]:
          - /url: https://www.tampermonkey.net/index.php?browser=firefox
          - strong [ref=e78]: Firefox
        - text: 。
      - paragraph [ref=e79]: 有些人也会把篡改猴(Tampermonkey)称作油猴(Greasemonkey)，尽管后者只是一款仅适用于 Firefox 浏览器的浏览器扩展程序。
      - paragraph [ref=e80]:
        - text: 它允许用户自定义并
        - strong [ref=e81]: 增强您最喜爱的网页的功能
        - text: 。用户脚本是小型 JavaScript 程序，可用于向网页添加新功能或修改现有功能。使用 篡改猴，您可以轻松在任何网站上创建、管理和运行这些用户脚本。
      - paragraph [ref=e82]: 例如，使用 篡改猴，您可以向网页添加一个新按钮，可以快速在社交媒体上分享链接，或自动填写带有个人信息的表格。在数字化时代，这特别有用，因为网页常常被用作访问广泛的服务和应用程序的用户界面。
      - paragraph [ref=e83]:
        - text: 此外，篡改猴
        - strong [ref=e84]: 使您轻松找到并安装其他用户创建的用户脚本
        - text: 。这意味着您可以快速轻松地访问为您喜爱的网页定制的广泛库，而无需花费数小时编写自己的代码。
      - paragraph [ref=e85]:
        - text: 无论您是希望为您的站点添加新功能的
        - strong [ref=e86]: Web 开发人员
        - text: ，还是只是希望
        - strong [ref=e87]: 改善在线体验的普通用户
        - text: ，篡改猴 都是您的工具箱中的一个很好的工具。
      - table [ref=e88]:
