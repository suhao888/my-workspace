            - group "描述" [ref=e282]:
              - heading "描述" [level=2] [ref=e283]
              - generic [ref=e284]:
                - generic [ref=e285]: "使用篡改猴 (Tampermonkey) 增强您的浏览体验！🌐🚀 Tampermonkey 是一款功能强大的浏览器扩展，拥有超过1000万，可通过在网站上运行用户脚本来增强您的浏览体验。 用户脚本是一些小型程序，可用于修改页面布局、添加或移除功能，以及自动执行操作，从而个性化您的网页体验。 ### 🔑 主要功能：### 🛠️ 高效管理和编辑您的用户脚本 ⚡ 只需点击两次即可快速启用或禁用脚本 🔗 使用浏览器同步及多种云存储服务同步脚本（Google Drive、Dropbox、OneDrive、Yandex.Disk 和 WebDAV） 💾 通过 zip 文件和/或云存储备份与恢复设置及用户脚本 🔄 自动更新脚本，带来无缝体验 如需全面了解，请查看我们的常见问题，或直接安装此扩展。💡 ### 🔍 发现用户脚本：### 在 www.userscript.zone 查找丰富多样的用户脚本。🌟 ### 📌 实用链接：### 🐛 问题反馈：http://tmnk.net/bug 📝 完整更新日志：http://tmnk.net/changelog.php?ext=iikm ❓ 常见问题：http://tmnk.net/faq 🔎 用户脚本搜索：https://www.userscript.zone ### 🔐 数据使用与隐私：### 篡改猴会收集匿名使用信息以改善您的体验，例如： 📦 扩展版本 🌍 首选语言 🚫 脚本安装情况（用于黑名单更新） 🖥️ 浏览器和操作系统类型 此外，当发生内部错误时，系统会自动发送包含匿名信息的错误报告。 您可以在扩展设置中调整“匿名统计”选项以禁用此功能。⚙️ 注意：在无痕模式下，不会收集或发送任何使用信息。🕵️‍♂️ 对于某些特定功能（例如黑名单更新），可能会收集浏览器 user-agent 字符串中的数据。 您可以通过调整“用户脚本黑名单来源”和“显示更新通知”设置来禁用此功能。 ### 📍 位置信息：### 如果启用了“用户脚本黑名单来源”或“显示更新通知”设置，篡改猴会发送 HTTP 请求，而这些请求会自然包含您的 IP 地址。 服务器日志中仅保存截断后的 IP 地址。如果启用了“匿名统计”，您的 IP 地址将用于确定您的大致地区或国家。🌏 感谢您使用篡改猴 (Tampermonkey)！😃"
                - link "显示有关 篡改猴 的更多信息" [ref=e286] [cursor=pointer]:
