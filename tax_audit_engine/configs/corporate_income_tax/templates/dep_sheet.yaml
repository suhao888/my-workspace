# ============================================================
# 3-03-01 固定资产折旧审核表 模板配置
# 按资产类别汇总写入，生成合计和审核说明
# ============================================================

instructions:
  - instruction: asset_category_rows
    sheet: "3-03-01"
    col_orig: 5
    col_acct_depr: 6
    col_tax_depr: 9
    cat_rows:
      房屋、建筑物: 10
      机器设备: 11
      生产器具、工具: 12
      运输工具: 13
      电子设备: 14
      其他设备: 15
    sum_row: 9
    note_row: 29
    note_template: "一、审核项目说明及结论：本企业固定资产合计{total_orig:,.0f}元，会计折旧{total_acct:,.0f}元，税收折旧{total_tax:,.0f}元，纳税调整{net_adj:,.0f}元。该数据来源于企业年度账表，经审核确认上述金额。"
