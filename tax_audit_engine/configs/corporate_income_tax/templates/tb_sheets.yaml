# ============================================================
# 2-00 会计账簿（试算平衡表）模板配置
# 
# 利润表: 固定行号+列号映射
# 资产负债表: 固定行号+列号映射
# 特殊: 营业总收入=营业收入, 营业总成本=各项成本费用加总
# ============================================================

instructions:
  # ---- 利润表行映射 ----
  - instruction: row_map
    sheet: "2-00"
    sheet_fallback: "会计报表"
    col: 4
    entries:
      # 一、营业总收入 = 营业收入（R11）
      - row: 11
        value_from: calc:sum_tb(主营业务收入,其他业务收入)
      # 营业收入（R12，其中项）
      - row: 12
        value_from: calc:sum_tb(主营业务收入,其他业务收入)
      # 营业总成本（R18）
      - row: 19
        value_from: tb.营业成本
      - row: 33
        value_from: tb.税金及附加
      - row: 34
        value_from: tb.销售费用
      - row: 35
        value_from: tb.管理费用
      - row: 36
        value_from: tb.研发费用
      - row: 37
        value_from: tb.财务费用
      - row: 42
        value_from: tb.其他收益
      - row: 43
        value_from: tb.投资收益
      - row: 47
        value_from: tb.公允价值变动收益
      - row: 48
        value_from: tb.信用减值损失
      - row: 49
        value_from: tb.资产减值损失
      - row: 50
        value_from: tb.资产处置收益
      - row: 55
        value_from: tb.营业外收入
      - row: 56
        value_from: tb.政府补助

  # ---- 营业总成本（R18 = 营业成本+税金+销售管理研发财务+资产减值） ----
  - instruction: cell
    sheet: "2-00"
    sheet_fallback: "会计报表"
    row: 18
    col: 4
    value_from: calc:sum_tb(营业成本,税金及附加,销售费用,管理费用,研发费用,财务费用,资产减值损失)

  # ---- 营业利润（R53 免填，有公式） ----
  # ---- 营业外支出（R57） ----
  - instruction: cell
    sheet: "2-00"
    sheet_fallback: "会计报表"
    row: 57
    col: 4
    value_from: tb.营业外支出

  # ---- 利润总额（R59） ----
  - instruction: cell
    sheet: "2-00"
    sheet_fallback: "会计报表"
    row: 59
    col: 4
    value_from: calc:profit

  # ---- 资产负债表行映射 ----
  - instruction: row_map
    sheet: "2-00"
    sheet_fallback: "会计报表"
    col: 4
    entries:
      # 资产类
      - row: 94
        value_from: tb.货币资金
      - row: 97
        value_from: tb.应收账款
      - row: 99
        value_from: tb.预付款项
      - row: 100
        value_from: tb.其他应收款
      - row: 103
        value_from: tb.存货
      - row: 110
        value_from: tb.固定资产
      - row: 111
        value_from: tb.在建工程
      # 负债类
      - row: 144
        value_from: tb.短期借款
      - row: 148
        value_from: tb.应付账款
      - row: 149
        value_from: tb.预收款项
      - row: 151
        value_from: tb.应付职工薪酬
      - row: 153
        value_from: tb.应交税费
      - row: 161
        value_from: tb.长期借款
      # 权益类
      - row: 183
        value_from: tb.实收资本
      - row: 185
        value_from: tb.资本公积
      - row: 186
        value_from: tb.盈余公积
      - row: 187
        value_from: tb.未分配利润
