                id: view_4,
                role: button,
                label: 还原,
                description: view_4,
                action_types: [click],
                locator_priority:
                  [
                    {type: accessibility, automation_id: view_4},
                    {type: ocr_text, text: 还原, match: contains, min_confidence: 0.8},
                    {type: bbox_norm, value: [0.9425, 0, 0.02875, 0.04201680672268908]}
                  ],
                visual: {bbox_norm: [0.9425, 0, 0.02875, 0.04201680672268908], center_norm: [0.956875, 0.02100840336134454]},
                risk_level: safe,
                approval_required: false
              },
            {
                kind: control,
                id: view_2,
                role: button,
                label: 最小化,
                description: view_2,
                action_types: [click],
                locator_priority:
                  [
                    {type: accessibility, automation_id: view_2},
                    {type: ocr_text, text: 最小化, match: contains, min_confidence: 0.8},
                    {type: bbox_norm, value: [0.91375, 0, 0.02875, 0.04201680672268908]}
                  ],
                visual: {bbox_norm: [0.91375, 0, 0.02875, 0.04201680672268908], center_norm: [0.928125, 0.02100840336134454]},
