version: "0.1"
app:
  id: microsoft-edge
  name: Microsoft Edge
  platform: windows
  launch_hint: attach_after_launch
visual_box:
  id: microsoft-edge-capsule
  mode: same_session_virtual_display
  platform: windows
  display:
    width_px: 1280
    height_px: 800
    scale: 1
    dpi_x: 96
    dpi_y: 96
    refresh_rate_hz: 60
  coordinate_space: normalized_client_rect
  contract:
    require_same_display: true
    require_client_size_px: [1280, 800]
    tolerate_client_size_delta_px: 2
    warn_client_size_delta_px: 40
    require_unminimized: true
    require_foreground_for_input: true
    validate_before_each_action: true
  fallbacks: []
regions: []
states:
  [
    {
        id: extensions_page2,
        description: Edge extensions page with developer mode,
        kind: page,
        anchors: [{type: visual_hash, hash: "0000000088000000", min_similarity: 0.82}],
        match_policy: any_anchor,
        controls:
          [
            {
                kind: control,
                id: ctrl,
                role: tab,
                label: 标签页栏,
                action_types: [click],
                locator_priority:
                  [
                    {type: accessibility, name: 标签页栏, role: AXTab},
                    {type: ocr_text, text: 标签页栏, match: contains, min_confidence: 0.8},
                    {type: bbox_norm, value: [0.00125, 0, 0.9125, 0.0430672268907563]}
                  ],
                visual: {bbox_norm: [0.00125, 0, 0.9125, 0.0430672268907563], center_norm: [0.45749999999999996, 0.02153361344537815]},
                risk_level: safe,
                approval_required: false
              },
            {
                kind: control,
                id: view_7,
                role: button,
                label: 关闭,
                description: view_7,
                action_types: [click],
                locator_priority:
                  [
                    {type: accessibility, automation_id: view_7},
                    {type: ocr_text, text: 关闭, match: contains, min_confidence: 0.8},
                    {type: bbox_norm, value: [0.97125, 0, 0.02875, 0.04201680672268908]}
                  ],
                visual: {bbox_norm: [0.97125, 0, 0.02875, 0.04201680672268908], center_norm: [0.985625, 0.02100840336134454]},
                risk_level: requires_confirmation,
